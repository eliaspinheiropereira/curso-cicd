name: Java CI/CD

on:
  push:
    branches:
      - main
jobs:
  build:
    name: meu primeiro job
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configurar java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: executar teste
        run: mvn clean verify

      - name: gerar jar
        run: mvn package -DskipTests

      - name: login dockerhub agora vai
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build imagem
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/api-cicd:latest \
          .

      - name: push para dockerhub
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/api-cicd:latest